<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Clone</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* inline critical styles to avoid FOUC */
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;image-rendering:pixelated}
    #game-canvas{display:block;width:100%;height:100%}
    #blocker{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;cursor:pointer}
    #blocker .msg{color:#fff;font-size:24px;text-align:center;line-height:1.8;user-select:none}
    #blocker .msg .icon{font-size:48px}
    #hud{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none}
    #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.8)}
    #crosshair::before{width:20px;height:2px;left:-10px;top:-1px}
    #crosshair::after{width:2px;height:20px;left:-1px;top:-10px}
    #breaking-progress{position:fixed;bottom:25%;left:50%;transform:translateX(-50%);width:48px;height:4px;background:rgba(0,0,0,0.5);border:1px solid #555;z-index:10;display:none;pointer-events:none}
    #breaking-progress .fill{height:100%;background:#fff;transition:width 0.05s linear}
    #block-name{position:fixed;top:55%;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;text-shadow:1px 1px 0 #000;z-index:10;pointer-events:none;display:none}
  </style>
</head>
<body>
  <div id="blocker">
    <div class="msg">
      <div class="icon">[+]</div>
      Click to play<br>
      <small>WASD = Move | Mouse = Look | Click = Mine/Place | E = Inventory | 1-9 = Hotbar</small>
    </div>
  </div>
  <div id="crosshair"></div>
  <div id="breaking-progress"><div class="fill" id="breaking-fill"></div></div>
  <div id="block-name"></div>
  <div id="hud"></div>
  <div id="inventory-overlay" class="hidden"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
